build_src_filter =
    +<nodes/sensor_node.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; ESP8266 NodeMCU v2 with PIR sensor
[env:node_sensor_esp8266_pir]
platform = espressif8266
board = nodemcuv2
build_flags =
    ${node_ota.build_flags}
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_RUNNING_CORE=1
    -D NODE_NAME=\"sensor-esp8266-pir\"
    -D HAS_PIR
build_src_filter =
    +<nodes/sensor_node_work.cpp>
    +<nodes/pir_sensor.cpp>
