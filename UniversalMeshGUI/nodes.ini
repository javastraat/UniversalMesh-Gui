lib_ignore =
    ${common_libs.lib_deps_ignore}

; WEMOS D1 R2 & mini (ESP8266) — 4MB flash, 3MB FS, 80MHz
[env:node_sensor_wemos_d1]
platform = espressif8266
board = d1
board_build.flash_size = 4MB
board_build.ldscript = eagle.flash.4m3m.ld
board_upload.speed = 460800
board_build.f_cpu = 80000000L
build_flags =
    ${node_ota.build_flags}
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D HAS_SHT30
    -D HAS_DISPLAY_SHIELD          ; remove this line if no OLED shield attached
    -D NODE_NAME=\"wemosd1-sht30\"
build_src_filter =
    +<nodes/wemos_sht30.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
    adafruit/Adafruit SHT31 Library
    olikraus/U8g2
lib_ignore =
    ${common_libs.lib_deps_ignore}
