; WEMOS D1 R2 & mini (ESP8266) — 4MB flash, 3MB FS, 80MHz
[env:node_sensor_wemos_d1]
platform = espressif8266
board = d1
board_build.flash_size = 4MB
board_build.ldscript = eagle.flash.4m3m.ld
board_upload.speed = 460800
board_build.f_cpu = 80000000L
build_flags =
    ${node_ota.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D NODE_NAME=\"sensor-tdongle-s3\"
    -D USER_SETUP_LOADED=1
    -D ST7735_DRIVER=1
    -D ST7735_GREENTAB160x80=1
    -D TFT_WIDTH=80
    -D TFT_HEIGHT=160
    -D TFT_MOSI=3
    -D TFT_SCLK=5
    -D TFT_CS=4
    -D TFT_DC=2
    -D TFT_RST=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=27000000
build_src_filter =
    +<nodes/sensor_node_s3.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
    bodmer/TFT_eSPI
    fastled/FastLED
lib_ignore =
    ${common_libs.lib_deps_ignore}

; ESP32-C6 DevKitC-1 — 4MB flash, no PSRAM, USB CDC, RGB LED
[env:node_sensor_c6]
board = esp32-c6-devkitc-1
board_build.partitions = min_spiffs.csv
build_flags =
    ${node_ota.build_flags}
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D HAS_RGB_LED
    -D NODE_NAME=\"sensor-c6\"
build_src_filter =
    +<nodes/sensor_node.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
    adafruit/Adafruit NeoPixel
lib_ignore =
    ${common_libs.lib_deps_ignore}

