; --- NODES ---
[env:-Nodes-]

; Generic ESP32 Dev Module — 4MB flash, no PSRAM, CP2102 USB-UART
[env:node_sensor_esp32]
board = esp32dev
board_build.flash_size = 4MB
board_build.flash_mode = qio
board_build.flash_freq = 80m
board_build.partitions = min_spiffs.csv
board_upload.speed = 921600
build_flags =
    ${node_ota.build_flags}
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_RUNNING_CORE=1
    -D NODE_NAME=\"sensor-esp32-green\"
build_src_filter =
    +<nodes/sensor_node.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; ESP32 with PIR sensor on GPIO36
[env:node_sensor_esp32_pir]
board = esp32dev
board_build.flash_size = 4MB
board_build.flash_mode = qio
board_build.flash_freq = 40m
board_build.partitions = min_spiffs.csv
board_upload.speed = 921600
build_flags =
    ${node_ota.build_flags}
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_RUNNING_CORE=1
    -D NODE_NAME=\"sensor-pir\"
    -D HAS_PIR
build_src_filter =
    +<nodes/sensor_node_work.cpp>
    +<nodes/pir_sensor.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

