; --- COORDINATORS ---
[env:-Coordinators-]

; Generic ESP32 (ESP32-D0WDQ6 DevKitC / esp32dev)
[env:coordinator_esp32]
board = esp32dev
board_build.partitions = min_spiffs.csv
build_src_filter =
    +<coordinators/coordinator_esp32.cpp>
    +<coordinators/web/web.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; The standard ESP32-S3 DevKitC-1 has 4MB flash and no PSRAM.
[env:coordinator_s3]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.partitions = min_spiffs.csv
build_src_filter =
    +<coordinators/coordinator_esp32.cpp>
    +<coordinators/web/web.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; Lilygo T8 S3 has 16MB flash and PSRAM.
[env:coordinator_t8_s3]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/t8_s3_16mb.csv
build_flags =
    -D BOARD_HAS_PSRAM
build_src_filter =
    +<coordinators/coordinator_esp32.cpp>
    +<coordinators/web/web.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; The ESP32-C6 DevKitC-1 has 4MB flash and no PSRAM, but supports USB CDC for serial communication.
[env:coordinator_c6]
board = esp32-c6-devkitc-1
board_build.partitions = min_spiffs.csv
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
build_src_filter =
    +<coordinators/coordinator_c6.cpp>
    +<coordinators/web/web.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
    adafruit/Adafruit NeoPixel
lib_ignore =
    ${common_libs.lib_deps_ignore}

; Lilygo T-ETH Elite has 16MB flash and PSRAM, with Ethernet and MQTT support.
[env:coordinator_eth_elite]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_NETWORK=\"mymesh\"
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
    -D NTP_SERVER=\"pool.ntp.org\"
    -D NTP_GMT_OFFSET_SEC=3600
    -D NTP_DAYLIGHT_OFFSET_SEC=3600
build_src_filter =
    +<coordinators/coordinator_eth_elite.cpp>
    +<coordinators/web/web.cpp>
    +<coordinators/eth.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

[env:coordinator_eth_elite_ota]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_NETWORK=\"Home\"
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
    -D NTP_SERVER=\"pool.ntp.org\"
    -D NTP_GMT_OFFSET_SEC=3600
    -D NTP_DAYLIGHT_OFFSET_SEC=3600
build_src_filter =
    +<coordinators/coordinator_eth_elite.cpp>
    +<coordinators/web/web.cpp>
    +<coordinators/eth.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}
upload_port = 192.168.2.208
upload_protocol = espota
upload_flags = --auth=mesh1234  ; keep in sync with OTA_PASSWORD above

; Lilygo T-ETH Elite with LR1121 has 16MB flash and PSRAM, with Ethernet, MQTT and LoRa support.
; NOTE: lib_deps is listed explicitly (not via common_libs) because LilyGO-T-ETH-Series bundles
; its own PubSubClient — including knolleary/PubSubClient a second time causes a linker conflict.
[env:coordinator_eth_elite_lora]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D HAS_LORA
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_NETWORK=\"mymesh\"
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
    -D NTP_SERVER=\"pool.ntp.org\"
    -D NTP_GMT_OFFSET_SEC=3600
    -D NTP_DAYLIGHT_OFFSET_SEC=3600
build_src_filter =
    +<coordinators/coordinator_eth_elite_lora.cpp>
    +<coordinators/web/web.cpp>
    +<coordinators/eth.cpp>
    +<coordinators/lora.cpp>
lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGO-T-ETH-Series
    https://github.com/johestephan/UniversalMesh
    bblanchon/ArduinoJson
    mathieucarbou/ESP Async WebServer
    mathieucarbou/AsyncTCP
    RadioLib
    ; knolleary/PubSubClient is intentionally omitted — LilyGO-T-ETH-Series bundles its own copy
lib_ignore =
    ${common_libs.lib_deps_ignore}

[env:coordinator_eth_elite_lora_ota]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D HAS_LORA
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_NETWORK=\"mymesh\"
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
    -D NTP_SERVER=\"pool.ntp.org\"
    -D NTP_GMT_OFFSET_SEC=3600
    -D NTP_DAYLIGHT_OFFSET_SEC=3600
build_src_filter =
    +<coordinators/coordinator_eth_elite_lora.cpp>
    +<coordinators/web/web.cpp>
    +<coordinators/eth.cpp>
    +<coordinators/lora.cpp>
lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGO-T-ETH-Series
    https://github.com/johestephan/UniversalMesh
    bblanchon/ArduinoJson
    mathieucarbou/ESP Async WebServer
    mathieucarbou/AsyncTCP
    RadioLib
    ; knolleary/PubSubClient is intentionally omitted — LilyGO-T-ETH-Series bundles its own copy
lib_ignore =
    ${common_libs.lib_deps_ignore}
    upload_port = 192.168.2.193
upload_protocol = espota
upload_flags = --auth=mesh1234  ; keep in sync with OTA_PASSWORD above
    