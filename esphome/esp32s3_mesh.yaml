substitutions:
  devicename: esp32s3-mesh
  node_name: esp32s3-node
  version: "1.0"

esphome:
  name: $devicename
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    lib_ignore:
      - UniversalMesh
    lib_deps:
      - https://github.com/johestephan/UniversalMesh

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: "dummy"
  password: "dummypass"
  fast_connect: true
  reboot_timeout: 0s
  power_save_mode: NONE

# no api: — coordinator bridges to HA instead
# no captive_portal
# no ota via wifi — use coordinator mesh OTA

logger:
  level: INFO
  logs:
    wifi: ERROR
    wifi_esp32: ERROR

external_components:
  - source:
      type: git
      url: https://github.com/javastraat/UniversalMeshGui
      ref: main
    components: [universalmesh]

universalmesh:
  id: mesh_node
  node_name: $node_name
  update_interval: 60s
  heartbeat_interval: 120s
  sensors:
    - sensor_id: temperature
      key: temp

sensor:
  - platform: internal_temperature
    name: "CPU Temperature"
    id: temperature
    update_interval: 10s

  - platform: uptime
    id: uptime_s
    update_interval: 10s
